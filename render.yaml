services:
  - type: web
    name: bocara-api
    env: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

      # Auth
      - key: JWT_SECRET
        generateValue: false  # set manually in Render dashboard
        sync: false

      # Stripe
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # PayU Latam
      - key: PAYU_MERCHANT_ID
        sync: false
      - key: PAYU_API_KEY
        sync: false
      - key: PAYU_API_LOGIN
        sync: false
      - key: PAYU_ACCOUNT_ID
        sync: false
      - key: PAYU_SANDBOX
        value: "false"

      # App
      - key: BOCARA_COMMISSION_PERCENT
        value: "15"
      - key: API_BASE_URL
        value: https://api.bocarafood.com

      # Expo Push Notifications
      - key: EXPO_ACCESS_TOKEN
        sync: false

      # Delivery (opcional)
      - key: DELIVERY_BASE_FEE_GTM_CITY
        value: "15"
      - key: DELIVERY_BASE_FEE_METRO
        value: "25"
      - key: DELIVERY_BASE_FEE_INTERIOR
        value: "50"
